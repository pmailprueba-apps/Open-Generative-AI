<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --cream: #FDFBF7; --navy: #0A1128; }
        body { margin: 0; background: var(--navy); font-family: 'Outfit', sans-serif; overflow: hidden; }
        #index-root { width: 1080px; height: 1920px; position: relative; }
        .scene { position: absolute; inset: 0; display: none; opacity: 0; }
        .font-serif { font-family: 'DM Serif Display', serif; }
        .caption-word { display: inline-block; margin: 0 0.15em; opacity: 0.4; transform: scale(0.9); transition: all 0.2s; }
        .caption-word.active { opacity: 1; color: var(--gold); transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="index-root" data-composition-id="index" data-width="1080" data-height="1920" data-start="0" data-duration="15">
        
        <div id="c1" class="scene">
            <img id="img1" src="assets/hero_real_aristeus.png" data-start="0" data-duration="4" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center p-12 text-center">
                <h1 id="t1" class="font-serif text-8xl opacity-0">PRÓXIMA<br><span class="text-[#D4AF37]">APERTURA.</span></h1>
            </div>
        </div>

        <div id="c2" class="scene">
            <div class="absolute inset-0 bg-[#FDFBF7] flex items-center justify-center p-12">
                <img id="l2" src="assets/logo_aristeus_premium.png" data-start="4" data-duration="4" class="w-4/5 opacity-0 scale-90">
            </div>
        </div>

        <div id="c3" class="scene">
            <img id="img3" src="assets/local_aristeus_ruta57.png" data-start="8" data-duration="4" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/60 flex items-center justify-center p-12 text-center">
                <div id="t3" class="opacity-0">
                    <p class="text-3xl text-white mb-4">ENCUÉNTRANOS EN</p>
                    <h2 class="font-serif text-9xl text-[#D4AF37]">RUTA 57</h2>
                </div>
            </div>
        </div>

        <div id="c4" class="scene">
            <div class="absolute inset-0 bg-[#0A1128] flex flex-col items-center justify-center text-center p-12">
                <img id="l4" src="assets/logo_aristeus_premium.png" data-start="12" data-duration="3" class="w-1/2 mb-12 opacity-0">
                <h2 id="t4" class="font-serif text-7xl text-white opacity-0">SABOR ULTRA PREMIUM.</h2>
            </div>
        </div>

        <audio id="audio" src="assets/narration.wav" data-start="0" data-duration="15" preload="auto"></audio>

        <div id="captions" class="absolute bottom-32 left-0 w-full px-12 pointer-events-none">
            <div id="caption-container" class="bg-black/40 p-8 rounded-3xl min-h-[160px] flex items-center justify-center flex-wrap text-5xl font-bold text-center text-white"></div>
        </div>
    </div>

    <script>
        const TRANSCRIPT = {"words":[{"word":"CHILAQUILES","start":0.0,"end":0.64},{"word":"ARISTEUS.","start":0.64,"end":1.32},{"word":"EN","start":1.32,"end":1.48},{"word":"RUTA","start":1.48,"end":1.92},{"word":"57.","start":1.92,"end":2.4},{"word":"SALSAS","start":2.4,"end":3.08},{"word":"ARTESANALES,","start":3.08,"end":3.96},{"word":"SABOR","start":3.96,"end":4.56},{"word":"ULTRA","start":4.56,"end":5.08},{"word":"PREMIUM.","start":5.08,"end":5.88},{"word":"MUY","start":5.88,"end":6.4},{"word":"PRONTO","start":6.4,"end":6.96},{"word":"EN","start":6.96,"end":7.2},{"word":"SAN","start":7.2,"end":7.48},{"word":"LUIS","start":7.48,"end":7.8},{"word":"POTOSÍ.","start":7.8,"end":8.6}]};
        const cont = document.getElementById('caption-container');
        TRANSCRIPT.words.forEach((w, i) => {
            const s = document.createElement('span'); s.textContent = w.word; s.className = 'caption-word'; s.id = `w${i}`;
            cont.appendChild(s);
        });

        const mainTl = gsap.timeline();
        mainTl.set("#c1", { display: "block", opacity: 1 }, 0);
        mainTl.to("#t1", { opacity: 1, duration: 1 }, 0.5);
        mainTl.set("#c1", { display: "none", opacity: 0 }, 4);
        mainTl.set("#c2", { display: "block", opacity: 1 }, 4);
        mainTl.to("#l2", { opacity: 1, scale: 1, duration: 1 }, 4.5);
        mainTl.set("#c2", { display: "none", opacity: 0 }, 8);
        mainTl.set("#c3", { display: "block", opacity: 1 }, 8);
        mainTl.to("#t3", { opacity: 1, duration: 1 }, 8.5);
        mainTl.set("#c3", { display: "none", opacity: 0 }, 12);
        mainTl.set("#c4", { display: "block", opacity: 1 }, 12);
        mainTl.to("#l4", { opacity: 1, duration: 1 }, 12.2);
        mainTl.to("#t4", { opacity: 1, duration: 1 }, 12.8);
        TRANSCRIPT.words.forEach((w, i) => {
            mainTl.set(`#w${i}`, { className: 'caption-word active' }, w.start);
            mainTl.set(`#w${i}`, { className: 'caption-word' }, w.end);
        });

        // Registry
        window.__timelines = {
            "index": mainTl
        };
    </script>
</body>
</html>
