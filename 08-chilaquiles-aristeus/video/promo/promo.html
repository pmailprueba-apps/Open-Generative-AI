<!doctype html>
<html data-composition-variables='[]'>
  <head>
    <meta charset="UTF-8" />
    <title>Chilaquiles Aristeus Promo</title>
    <style>
      body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:Inter,system-ui;}
      .scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
      .title{font-size:56px;color:#fff;}
      .subtitle{font-size:32px;color:#fff;margin-top:10px;}
      .cta{margin-top:20px;padding:10px 20px;background:#ff5a5f;color:#fff;border-radius:6px;text-decoration:none;font-size:28px;}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
    </script>
  </head>
  <body>
    <!-- Scene 1 – Opening -->
    <div id="scene1" class="scene" data-composition-id="scene1" data-width="1080" data-height="1920" data-start="0" data-duration="3" data-track-index="1">
      <h1 class="title">¡Chilaquiles Aristeus está por abrir!</h1>
    </div>
    <!-- Scene 2 – Highlights -->
    <div id="scene2" class="scene" data-composition-id="scene2" data-width="1080" data-height="1920" data-start="3" data-duration="4" data-track-index="1" style="background:#2b2b2b;">
      <img src="https://images.unsplash.com/photo-1602526209271-0ddf5eabdf5c?auto=format&fit=crop&w=600&q=80" style="width:80%;border-radius:8px;" alt="Chilaquiles" />
      <h2 class="title" style="margin-top:20px;">Sabores auténticos</h2>
      <p class="subtitle">Salsas artesanales, queso fundido y tradición.</p>
    </div>
    <!-- Scene 3 – CTA -->
    <div id="scene3" class="scene" data-composition-id="scene3" data-width="1080" data-height="1920" data-start="7" data-duration="3" data-track-index="1" style="background:#ff5a5f;">
      <h2 class="title">¡Reserva tu mesa ahora!</h2>
      <a href="https://chilaquiles-aristeus.com/preventas" class="cta">Pre‑order</a>
    </div>
    <!-- Scene 4 – Logo -->
    <div id="scene4" class="scene" data-composition-id="scene4" data-width="1080" data-height="1920" data-start="10" data-duration="3" data-track-index="1" style="background:#1a1a1a;">
      <img src="https://raw.githubusercontent.com/heygen/hyperframes/main/assets/logo.svg" style="height:120px;" alt="Logo" />
    </div>
    <script>
      // Helper to create a timeline for each scene
      function makeSceneTL(id, enterFrom) {
        const tl = gsap.timeline({ paused:true });
        tl.from(`#${id} .title, #${id} .subtitle, #${id} img, #${id} .cta`, {
          opacity:0,
          y:enterFrom,
          duration:0.8,
          ease:"power3.out"
        },0);
        window.__timelines[id]=tl;
      }
      makeSceneTL('scene1',40);
      makeSceneTL('scene2',40);
      makeSceneTL('scene3',40);
      makeSceneTL('scene4',0);
    </script>
  </body>
</html>
