<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aristeus | Pedir por WhatsApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --whatsapp: #25D366;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .background-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            opacity: 0.1;
            filter: blur(80px);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo {
            width: 80px;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.3));
        }

        h1 {
            font-weight: 900;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p {
            color: #aaa;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--whatsapp);
            color: #fff;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }

        .btn-whatsapp:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.4);
        }

        .qr-container {
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .qr-container img {
            width: 150px;
            border-radius: 10px;
            background: #fff;
            padding: 10px;
        }

        .qr-label {
            display: block;
            margin-top: 10px;
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="background-blob"></div>
    
    <div class="container">
        <img src="../assets/logo_aristeus_premium.png" alt="Aristeus Logo" class="logo">
        <h1>Aristeus</h1>
        <p>Una Parada de Leyenda en la Ruta 57</p>

            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">

            ORDENAR AHORA

</body>
</html>
