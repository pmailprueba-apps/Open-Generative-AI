<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aristeus | Anuncio Apertura</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --white: #ffffff;
        }

        body {
            background-color: #121212;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .ad-container {
            width: 500px;
            background: var(--black);
            border: 2px solid var(--gold);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }

        .hero-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
        }

        .content {
            padding: 30px;
            text-align: center;
        }

        .badge {
            background: var(--gold);
            color: #000;
            display: inline-block;
            padding: 5px 15px;
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            line-height: 1;
        }

        h1 span {
            color: var(--gold);
        }

        p {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 25px;
        }

        .offer-box {
            background: rgba(255,255,255,0.05);
            border: 1px dashed var(--gold);
            padding: 20px;
            margin-bottom: 25px;
        }

        .offer-text {
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--white);
        }

        .btn-wa {
            display: block;
            background: #25D366;
            color: #fff;
            text-decoration: none;
            padding: 15px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 5px;
        }

        /* THE REAL LOGO */
        .logo-main {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 120px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .footer {
            background: #000;
            padding: 15px;
            font-size: 0.7rem;
            color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <!-- REAL LOGO -->
        <img src="../assets/aristeus_final_logo.png" alt="Aristeus Logo" class="logo-main">
        
        <img src="../assets/bolas_arroz_final.png" alt="Bolas de Arroz Aristeus" class="hero-image">
        
        <div class="content">
            <span class="badge">Receta Única en SLP</span>
            <h1>ARTESANOS DE LA <span>SALSA</span></h1>
            <p>La Receta Secreta que San Luis Potosí estaba esperando.</p>
            
            <div class="offer-box">
                <div class="offer-text">DESCUBRE NUESTRAS BOLAS DE ARROZ <br> EL COMPLEMENTO QUE NO CONOCÍAS</div>
            </div>

            <a href="https://wa.me/message/6HQIB5PSPJCLG1" class="btn-wa">RESERVAR POR WHATSAPP</a>
        </div>

        <div class="footer">
            📍 UBICACIÓN: AUTOLAVADO RUTA 57 | SAN LUIS POTOSÍ
        </div>
    </div>
</body>
</html>
