<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster QR Aristeus - Food Truck</title>
    <!-- Preconnect for Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Preload Critical Assets -->
    <link rel="preload" href="hero_real_aristeus.png" as="image">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" crossorigin="anonymous">
    <!-- El motor de captura se carga al final del archivo -->
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0f0f0f;
            --white: #ffffff;
            --red: #8B0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--white);
        }



        .poster {
            width: 800px;
            height: 1200px;
            background-color: #000;
            background-image: 
                linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
                url('hero_real_aristeus.png');
            background-size: cover;
            background-position: center;
            border: 15px solid var(--gold);
            padding: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 150px #000;
        }

        .food-truck-badge {
            background: var(--gold);
            color: var(--dark);
            padding: 5px 20px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 18px;
            letter-spacing: 3px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .poster::before {
            display: none;
        }

        .poster > * {
            position: relative;
            z-index: 1;
        }

        .logo {
            width: 250px;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 80px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 25px;
            line-height: 1.15; /* Safari Safety */
        }

        .subtitle {
            font-size: 32px;
            color: var(--white);
            font-weight: 400;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 60px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
        }

        .qr-container {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
            margin-bottom: 50px;
            position: relative;
        }

        .qr-container img {
            width: 350px;
            height: 350px;
            display: block;
        }

        .cta {
            font-size: 28px;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 40px;
        }

        .address {
            font-size: 22px;
            color: #888;
            margin-top: auto;
            font-style: normal;
        }

        .tagline {
            font-style: italic;
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>
<body>


    <div class="poster" id="captureArea">

        <!-- Logo de Aristeus -->
        <img src="logo_v2.png" alt="Logo Aristeus" class="logo">

        <header>
            <h1>Próxima</h1>
            <div class="subtitle">Apertura</div>
        </header>

        <div class="qr-container">
            <!-- Generamos el QR localmente para que Safari NO pueda bloquearlo en la captura -->
            <div id="qrcode"></div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
        <script>
            new QRCode(document.getElementById("qrcode"), {
                text: "https://aristeus-premium-menu.web.app/",
                width: 350,
                height: 350,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        </script>

        <p class="cta">Escanea y descubre el sabor artesanal</p>
        
        <footer>
            <address class="address">Calle 2a #185, Col. Aviación, SLP</address>
            <p class="tagline">"Artesanos de la Salsa"</p>
        </footer>
    </div>

    <!-- Universal Capture Tool PRO (Safari Compatible) -->
    <script 
        src="../../common/libs/universal-capture.js" 
        data-target="#captureArea" 
        data-theme="#D4AF37" 
        data-filename="poster_aristeus_hd.png">
    </script>
</body>
</html>
