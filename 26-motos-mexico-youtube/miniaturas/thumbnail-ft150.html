<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px; height: 720px;
      background: #FF5722;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      font-family: 'Oswald', 'Impact', sans-serif;
      overflow: hidden;
      position: relative;
    }
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 8px; background: #1A1A1A;
    }
    .bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 8px; background: #1A1A1A;
    }
    .tag {
      position: absolute; top: 24px; left: 24px;
      background: #1A1A1A; color: #FFF;
      padding: 8px 20px; border-radius: 4px;
      font-size: 18px; font-weight: 600;
      letter-spacing: 2px; font-family: 'Montserrat', sans-serif;
    }
    .channel {
      position: absolute; bottom: 24px; left: 24px;
      color: rgba(255,255,255,0.7);
      font-size: 16px; font-family: 'Montserrat', sans-serif;
    }
    .main-text {
      font-size: 96px; font-weight: 900;
      color: #FFFFFF; text-transform: uppercase;
      text-align: center; line-height: 1;
      text-shadow: 4px 4px 0 #1A1A1A;
      letter-spacing: 1px;
    }
    .sub-text {
      font-size: 52px; font-weight: 700;
      color: #FFB300; text-transform: uppercase;
      text-align: center; margin-top: 8px;
      text-shadow: 3px 3px 0 #1A1A1A;
      letter-spacing: 2px;
    }
    .badge {
      position: absolute; bottom: 24px; right: 24px;
      background: #1A1A1A; color: #FFB300;
      padding: 6px 16px; border-radius: 4px;
      font-size: 14px; font-weight: 600;
      font-family: 'Montserrat', sans-serif;
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="bottom-bar"></div>
  <div class="tag">REVIEW</div>
  <div class="main-text">ITALIKA FT150</div>
  <div class="sub-text">¿1 AÑO DESPUÉS?</div>
  <div class="channel">@MotocicletasMX</div>
  <div class="badge">7.5/10</div>
</body>
</html>
